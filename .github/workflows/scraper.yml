name: Daily Job Scraper

on:
  schedule:
    # Runs at 14:00 UTC (9:00 AM EST) every day
    - cron: '0 14 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

permissions:
  contents: write # Needed to commit the data.db back to the repo

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Fetch only the latest commit

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Web Scraper (scrape.py)
        # Using echo to pipe the URL to input()
        run: |
          echo "https://www.google.com/about/careers/applications/jobs/results/?q=%22Software%20Engineer%22&location=United%20States" | python scrape.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Run Parser and Notifier (main.py)
        run: python main.py
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}

      - name: Commit database changes
        # Only commit if data.db or data/ directory has changed
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add data.db data/
          git diff --staged --quiet || git commit -m "chore: Automate daily database update [skip ci]"
          git push
